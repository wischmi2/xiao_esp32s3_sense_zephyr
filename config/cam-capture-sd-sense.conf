# Phase 2: OV3660 QXGA (2048x1536) JPEG capture to microSD — BOOT button trigger

CONFIG_VIDEO=y
CONFIG_VIDEO_ESP32=y
CONFIG_VIDEO_SW_GENERATOR=n
CONFIG_VIDEO_OV3660=y
CONFIG_DMA=y
CONFIG_DMA_ESP32=y

# QXGA JPEG DMA buffer = 2048*1536 (~3.1 MB); needs 769 descriptors @ 4095 B/block
CONFIG_VIDEO_BUFFER_POOL_SZ_MAX=3145728
CONFIG_VIDEO_BUFFER_POOL_NUM_MAX=2
CONFIG_VIDEO_BUFFER_POOL_ALIGN=32
CONFIG_DMA_ESP32_MAX_DESCRIPTOR_NUM=1024
CONFIG_VIDEO_BUFFER_USE_SHARED_MULTI_HEAP=y
CONFIG_VIDEO_BUFFER_SMH_ATTRIBUTE=2

CONFIG_ESP_SPIRAM=y
CONFIG_SPIRAM_MODE_OCT=y
# Default SPIRAM heap is only 1 MB — QXGA needs 2×2048×1536 (~6.3 MB) for video buffers
CONFIG_ESP_SPIRAM_HEAP_SIZE=6815744

CONFIG_DISK_ACCESS=y
CONFIG_FILE_SYSTEM=y
CONFIG_FAT_FILESYSTEM_ELM=y
CONFIG_SPI=y
CONFIG_GPIO=y
CONFIG_DISK_DRIVER_SDMMC=y

CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_LOG_MODE_IMMEDIATE=y
CONFIG_PRINTK=y
CONFIG_PICOLIBC_USE_MODULE=y
CONFIG_DISPLAY=n

# Larger stack for 3 MB frame path + FAT write
CONFIG_MAIN_STACK_SIZE=8192
