# Phase 2: video/capture on XIAO ESP32S3 Sense (OV3660 + lcd_cam DVP)
# Based on boards/esp32s3_eye_procpu.conf; OV3660 needs OCTAL PSRAM per Seeed/ESP-IDF notes.

CONFIG_VIDEO=y
CONFIG_VIDEO_ESP32=y
CONFIG_VIDEO_SW_GENERATOR=n
CONFIG_VIDEO_OV3660=y
CONFIG_DMA=y
CONFIG_DMA_ESP32=y

CONFIG_VIDEO_BUFFER_POOL_SZ_MAX=40000
CONFIG_VIDEO_BUFFER_POOL_NUM_MAX=3
CONFIG_VIDEO_BUFFER_POOL_ALIGN=32
CONFIG_DMA_ESP32_MAX_DESCRIPTOR_NUM=64
CONFIG_VIDEO_BUFFER_USE_SHARED_MULTI_HEAP=y
CONFIG_VIDEO_BUFFER_SMH_ATTRIBUTE=2

CONFIG_ESP_SPIRAM=y
CONFIG_SPIRAM_MODE_OCT=y

CONFIG_VIDEO_FRAME_HEIGHT=240
CONFIG_VIDEO_FRAME_WIDTH=320
CONFIG_VIDEO_PIXEL_FORMAT="RGBP"

CONFIG_LOG=y
CONFIG_PRINTK=y
CONFIG_PICOLIBC_USE_MODULE=y

# No display on Sense board — capture sample loops without zephyr,display
CONFIG_DISPLAY=n
